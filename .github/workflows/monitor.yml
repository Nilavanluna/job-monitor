import os
import requests

TELEGRAM_BOT_TOKEN = os.environ["TELEGRAM_BOT_TOKEN"]
TELEGRAM_CHAT_ID   = os.environ["TELEGRAM_CHAT_ID"]

def send_message(text: str):
    url     = f"https://api.telegram.org/bot{TELEGRAM_BOT_TOKEN}/sendMessage"
    payload = {
        "chat_id": TELEGRAM_CHAT_ID,
        "text":    text,
    }
    try:
        resp = requests.post(url, json=payload, timeout=10)
        resp.raise_for_status()
    except Exception as e:
        print(f"[Telegram] Failed to send message: {e}")
        print(f"[Telegram] Response: {resp.text if 'resp' in dir() else 'no response'}")

def notify_new_jobs(new_jobs: list[dict]):
    if not new_jobs:
        return

    for job in new_jobs:
        msg = "\n".join([
            "New Job Alert!",
            f"Company: {job['company']}",
            f"Role: {job['title']}",
            f"Location: {job['location']}",
            f"Link: {job['url']}",
        ])
        send_message(msg)

    if len(new_jobs) > 3:
        companies = list({j["company"] for j in new_jobs})
        send_message(f"{len(new_jobs)} new jobs found! Companies: {', '.join(companies)}")
